syntax = "proto3";

package tearleads.v2;

service VfsService {
  rpc GetMyKeys(VfsGetMyKeysRequest) returns (VfsGetMyKeysResponse);
  rpc GetUserSigningKey(VfsGetUserSigningKeyRequest)
      returns (VfsGetUserSigningKeyResponse);
  rpc SetupKeys(VfsSetupKeysRequest) returns (VfsSetupKeysResponse);
  rpc Register(VfsRegisterRequest) returns (VfsRegisterResponse);
  rpc GetBlob(VfsGetBlobRequest) returns (VfsGetBlobResponse);
  rpc GetBlobManifest(VfsGetBlobManifestRequest)
      returns (VfsGetBlobManifestResponse);
  rpc GetBlobChunk(VfsGetBlobChunkRequest) returns (VfsGetBlobChunkResponse);
  rpc DeleteBlob(VfsDeleteBlobRequest) returns (VfsDeleteBlobResponse);
  rpc StageBlob(VfsStageBlobRequest) returns (VfsStageBlobResponse);
  rpc UploadBlobChunk(VfsUploadBlobChunkRequest)
      returns (VfsUploadBlobChunkResponse);
  rpc AttachBlob(VfsAttachBlobRequest) returns (VfsAttachBlobResponse);
  rpc AbandonBlob(VfsAbandonBlobRequest) returns (VfsAbandonBlobResponse);
  rpc CommitBlob(VfsCommitBlobRequest) returns (VfsCommitBlobResponse);
  rpc RekeyItem(VfsRekeyItemRequest) returns (VfsRekeyItemResponse);
  rpc PushCrdtOps(VfsPushCrdtOpsRequest) returns (VfsPushCrdtOpsResponse);
  rpc ReconcileCrdt(VfsReconcileCrdtRequest) returns (VfsReconcileCrdtResponse);
  rpc ReconcileSync(VfsReconcileSyncRequest) returns (VfsReconcileSyncResponse);
  rpc RunCrdtSession(VfsRunCrdtSessionRequest)
      returns (VfsRunCrdtSessionResponse);
  rpc GetSync(VfsGetSyncRequest) returns (VfsGetSyncResponse);
  rpc GetCrdtSync(VfsGetCrdtSyncRequest) returns (VfsGetCrdtSyncResponse);
  rpc GetCrdtSnapshot(VfsGetCrdtSnapshotRequest)
      returns (VfsGetCrdtSnapshotResponse);
  rpc GetEmails(VfsGetEmailsRequest) returns (VfsGetEmailsResponse);
  rpc GetEmail(VfsGetEmailRequest) returns (VfsGetEmailResponse);
  rpc DeleteEmail(VfsDeleteEmailRequest) returns (VfsDeleteEmailResponse);
  rpc SendEmail(VfsSendEmailRequest) returns (VfsSendEmailResponse);
}

message VfsGetMyKeysRequest {}
message VfsGetMyKeysResponse {
  repeated string public_key_ids = 1;
  string public_encryption_key = 2;
  string public_signing_key = 3;
  optional string encrypted_private_keys = 4;
  optional string argon2_salt = 5;
}
message VfsGetUserSigningKeyRequest {
  string user_id = 1;
}
message VfsGetUserSigningKeyResponse {
  string user_id = 1;
  string public_signing_key = 2;
}
message VfsSetupKeysRequest {
  string public_encryption_key = 1;
  string public_signing_key = 2;
  string encrypted_private_keys = 3;
  string argon2_salt = 4;
}
message VfsSetupKeysResponse {
  bool created = 1;
}
message VfsRekeyWrappedKey {
  string recipient_user_id = 1;
  string recipient_public_key_id = 2;
  int32 key_epoch = 3;
  string encrypted_key = 4;
  string sender_signature = 5;
}
message VfsRekeyItemRequest {
  string item_id = 1;
  string reason = 2;
  int32 new_epoch = 3;
  repeated VfsRekeyWrappedKey wrapped_keys = 4;
}
message VfsRekeyItemResponse {
  bool success = 1;
  string item_id = 2;
  int32 new_epoch = 3;
  int32 wraps_applied = 4;
}
message VfsRegisterRequest {
  string id = 1;
  string object_type = 2;
  string encrypted_session_key = 3;
  optional string encrypted_name = 4;
}
message VfsRegisterResponse {
  string id = 1;
  string created_at = 2;
}
message VfsGetBlobRequest {
  string blob_id = 1;
}
message VfsGetBlobResponse {
  bytes data = 1;
  optional string content_type = 2;
}
message VfsDeleteBlobRequest {
  string blob_id = 1;
}
message VfsDeleteBlobResponse {
  bool deleted = 1;
  string blob_id = 2;
}
message VfsBlobStageUploadCheckpoint {
  string upload_id = 1;
  int32 next_chunk_index = 2;
}
message VfsBlobStageEncryption {
  string algorithm = 1;
  int32 key_epoch = 2;
  string manifest_hash = 3;
  int32 chunk_count = 4;
  int32 chunk_size_bytes = 5;
  int64 plaintext_size_bytes = 6;
  int64 ciphertext_size_bytes = 7;
  optional VfsBlobStageUploadCheckpoint checkpoint = 8;
}
message VfsStageBlobRequest {
  string blob_id = 1;
  string expires_at = 2;
  optional string staging_id = 3;
  optional string data_base64 = 4;
  optional string content_type = 5;
  optional VfsBlobStageEncryption encryption = 6;
}
message VfsStageBlobResponse {
  string staging_id = 1;
  string blob_id = 2;
  string status = 3;
  string staged_at = 4;
  string expires_at = 5;
}
message VfsUploadBlobChunkRequest {
  string staging_id = 1;
  string upload_id = 2;
  int32 chunk_index = 3;
  bool is_final = 4;
  string nonce = 5;
  string aad_hash = 6;
  string ciphertext_base64 = 7;
  int32 plaintext_length = 8;
  int32 ciphertext_length = 9;
}
message VfsUploadBlobChunkResponse {
  bool accepted = 1;
  string staging_id = 2;
  string upload_id = 3;
  int32 chunk_index = 4;
}
message VfsAttachBlobRequest {
  string staging_id = 1;
  string item_id = 2;
  optional string relation_kind = 3;
  optional string client_id = 4;
  optional string required_cursor = 5;
  map<string, int32> required_last_reconciled_write_ids = 6;
}
message VfsAttachBlobResponse {
  bool attached = 1;
  string staging_id = 2;
  string blob_id = 3;
  string item_id = 4;
  string relation_kind = 5;
  string ref_id = 6;
  string attached_at = 7;
}
message VfsAbandonBlobRequest {
  string staging_id = 1;
}
message VfsAbandonBlobResponse {
  bool abandoned = 1;
  string staging_id = 2;
  string status = 3;
}
message VfsCommitBlobRequest {
  string staging_id = 1;
  string upload_id = 2;
  int32 key_epoch = 3;
  string manifest_hash = 4;
  string manifest_signature = 5;
}
message VfsCommitBlobResponse {
  bool success = 1;
  string blob_id = 2;
}

enum VfsCrdtOpType {
  VFS_CRDT_OP_TYPE_UNSPECIFIED = 0;
  VFS_CRDT_OP_TYPE_ACL_ADD = 1;
  VFS_CRDT_OP_TYPE_ACL_REMOVE = 2;
  VFS_CRDT_OP_TYPE_LINK_ADD = 3;
  VFS_CRDT_OP_TYPE_LINK_REMOVE = 4;
  VFS_CRDT_OP_TYPE_ITEM_UPSERT = 5;
  VFS_CRDT_OP_TYPE_ITEM_DELETE = 6;
  VFS_CRDT_OP_TYPE_LINK_REASSIGN = 7;
}
enum VfsAclPrincipalType {
  VFS_ACL_PRINCIPAL_TYPE_UNSPECIFIED = 0;
  VFS_ACL_PRINCIPAL_TYPE_USER = 1;
  VFS_ACL_PRINCIPAL_TYPE_GROUP = 2;
  VFS_ACL_PRINCIPAL_TYPE_ORGANIZATION = 3;
}
enum VfsAclAccessLevel {
  VFS_ACL_ACCESS_LEVEL_UNSPECIFIED = 0;
  VFS_ACL_ACCESS_LEVEL_READ = 1;
  VFS_ACL_ACCESS_LEVEL_WRITE = 2;
  VFS_ACL_ACCESS_LEVEL_ADMIN = 3;
}
enum VfsCrdtPushStatus {
  VFS_CRDT_PUSH_STATUS_UNSPECIFIED = 0;
  VFS_CRDT_PUSH_STATUS_APPLIED = 1;
  VFS_CRDT_PUSH_STATUS_STALE_WRITE_ID = 2;
  VFS_CRDT_PUSH_STATUS_OUTDATED_OP = 3;
  VFS_CRDT_PUSH_STATUS_INVALID_OP = 4;
  VFS_CRDT_PUSH_STATUS_ALREADY_APPLIED = 5;
  VFS_CRDT_PUSH_STATUS_ENCRYPTED_ENVELOPE_UNSUPPORTED = 6;
  VFS_CRDT_PUSH_STATUS_ACL_DENIED = 7;
}
message VfsCrdtPushOperation {
  reserved 1 to 11, 28;
  bytes op_id = 17;
  VfsCrdtOpType op_type = 18;
  bytes item_id = 19;
  bytes replica_id = 20;
  uint64 write_id = 21;
  uint64 occurred_at_ms = 22;
  VfsAclPrincipalType principal_type = 23;
  bytes principal_id = 24;
  VfsAclAccessLevel access_level = 25;
  bytes parent_id = 26;
  bytes child_id = 27;
  optional string encrypted_payload = 12;
  optional int32 key_epoch = 13;
  optional string encryption_nonce = 14;
  optional string encryption_aad = 15;
  optional string encryption_signature = 16;
  optional bytes operation_signature = 29;
}
message VfsPushCrdtOpsRequest {
  reserved 1, 2;
  bytes organization_id = 4;
  bytes client_id = 5;
  repeated VfsCrdtPushOperation operations = 3;
}
message VfsCrdtPushResult {
  reserved 1, 2;
  bytes op_id = 3;
  VfsCrdtPushStatus status = 4;
}
message VfsPushCrdtOpsResponse {
  reserved 1;
  bytes client_id = 3;
  repeated VfsCrdtPushResult results = 2;
}
message VfsReconcileCrdtRequest {
  reserved 1, 2;
  bytes organization_id = 5;
  bytes client_id = 6;
  string cursor = 3;
  map<string, int32> last_reconciled_write_ids = 4;
}
message VfsReconcileCrdtResponse {
  reserved 1;
  bytes client_id = 4;
  string cursor = 2;
  map<string, int32> last_reconciled_write_ids = 3;
}
message VfsReconcileSyncRequest {
  reserved 1;
  bytes client_id = 3;
  string cursor = 2;
}
message VfsReconcileSyncResponse {
  reserved 1;
  bytes client_id = 3;
  string cursor = 2;
}
message VfsSyncBloomFilter {
  string data = 1;
  int32 capacity = 2;
  double error_rate = 3;
}
message VfsRunCrdtSessionRequest {
  reserved 1, 2, 7;
  bytes organization_id = 9;
  bytes client_id = 10;
  string cursor = 3;
  int32 limit = 4;
  repeated VfsCrdtPushOperation operations = 5;
  map<string, int32> last_reconciled_write_ids = 6;
  optional bytes root_id = 11;
  optional VfsSyncBloomFilter bloom_filter = 8;
}
message VfsRunCrdtSessionResponse {
  VfsPushCrdtOpsResponse push = 1;
  VfsGetCrdtSyncResponse pull = 2;
  VfsReconcileCrdtResponse reconcile = 3;
}
message VfsGetSyncRequest {
  reserved 3;
  string cursor = 1;
  int32 limit = 2;
  bytes root_id = 4;
}
message VfsSyncItem {
  reserved 1, 2, 4, 7, 8, 9;
  bytes change_id = 10;
  bytes item_id = 11;
  string change_type = 3;
  uint64 changed_at_ms = 12;
  optional string object_type = 5;
  optional string encrypted_name = 6;
  optional bytes owner_id = 13;
  optional uint64 created_at_ms = 14;
  VfsAclAccessLevel access_level = 15;
}
message VfsGetSyncResponse {
  repeated VfsSyncItem items = 1;
  optional string next_cursor = 2;
  bool has_more = 3;
}
message VfsGetCrdtSyncRequest {
  reserved 3;
  string cursor = 1;
  int32 limit = 2;
  optional VfsSyncBloomFilter bloom_filter = 4;
  bytes root_id = 5;
}
message VfsCrdtSyncItem {
  reserved 1 to 9, 11, 12;
  bytes op_id = 18;
  bytes item_id = 19;
  VfsCrdtOpType op_type = 20;
  VfsAclPrincipalType principal_type = 21;
  bytes principal_id = 22;
  VfsAclAccessLevel access_level = 23;
  bytes parent_id = 24;
  bytes child_id = 25;
  bytes actor_id = 26;
  string source_table = 10;
  bytes source_id = 27;
  uint64 occurred_at_ms = 28;
  optional string encrypted_payload = 13;
  optional int32 key_epoch = 14;
  optional string encryption_nonce = 15;
  optional string encryption_aad = 16;
  optional string encryption_signature = 17;
  optional string blob_id = 29;
  optional int64 blob_size_bytes = 30;
  optional string blob_relation_kind = 31;
  optional string operation_signature = 32;
  optional string actor_signing_public_key = 33;
}
message VfsGetCrdtSyncResponse {
  repeated VfsCrdtSyncItem items = 1;
  optional string next_cursor = 2;
  bool has_more = 3;
  map<string, int32> last_reconciled_write_ids = 4;
  optional VfsSyncBloomFilter bloom_filter = 5;
}
message VfsGetCrdtSnapshotRequest {
  string client_id = 1;
}
message VfsSnapshotCursor {
  string changed_at = 1;
  string change_id = 2;
}
message VfsSnapshotAclEntry {
  string item_id = 1;
  string principal_type = 2;
  string principal_id = 3;
  string access_level = 4;
}
message VfsSnapshotLinkEntry {
  string parent_id = 1;
  string child_id = 2;
}
message VfsSnapshotReplay {
  repeated VfsSnapshotAclEntry acl = 1;
  repeated VfsSnapshotLinkEntry links = 2;
  optional VfsSnapshotCursor cursor = 3;
}
message VfsSnapshotReconcileState {
  VfsSnapshotCursor cursor = 1;
  map<string, int32> last_reconciled_write_ids = 2;
}
message VfsSnapshotContainerClock {
  string container_id = 1;
  string changed_at = 2;
  string change_id = 3;
}
message VfsGetCrdtSnapshotResponse {
  VfsSnapshotReplay replay_snapshot = 1;
  optional VfsSnapshotReconcileState reconcile_state = 2;
  repeated VfsSnapshotContainerClock container_clocks = 3;
  string snapshot_updated_at = 4;
}
message VfsGetEmailsRequest {
  optional string cursor = 1;
  optional int32 limit = 2;
}
message VfsEmailItem {
  string id = 1;
  string thread_id = 2;
  string from = 3;
  repeated string to = 4;
  string subject = 5;
  string snippet = 6;
  string received_at = 7;
  bool is_read = 8;
  bool has_attachments = 9;
}
message VfsGetEmailsResponse {
  repeated VfsEmailItem items = 1;
  optional string next_cursor = 2;
}
message VfsEmailHeader {
  string name = 1;
  string value = 2;
}
message VfsGetEmailRequest {
  string id = 1;
}
message VfsGetEmailResponse {
  string id = 1;
  string thread_id = 2;
  string from = 3;
  repeated string to = 4;
  repeated string cc = 5;
  repeated string bcc = 6;
  string subject = 7;
  string body_html = 8;
  string body_text = 9;
  string received_at = 10;
  repeated VfsEmailHeader headers = 11;
}
message VfsDeleteEmailRequest {
  string id = 1;
}
message VfsDeleteEmailResponse {
  bool success = 1;
}
message VfsSendEmailAttachment {
  string name = 1;
  string content_base64 = 2;
  string content_type = 3;
}
message VfsSendEmailRequest {
  repeated string to = 1;
  repeated string cc = 2;
  repeated string bcc = 3;
  string subject = 4;
  string body = 5;
  repeated VfsSendEmailAttachment attachments = 6;
}
message VfsSendEmailResponse {
  bool success = 1;
  optional string message_id = 2;
}
message VfsGetBlobManifestRequest {
  string blob_id = 1;
}
message VfsGetBlobManifestResponse {
  string blob_id = 1;
  int32 key_epoch = 2;
  int32 chunk_count = 3;
  int64 total_plaintext_bytes = 4;
  int64 total_ciphertext_bytes = 5;
  repeated string chunk_hashes = 6;
  string manifest_hash = 7;
  string manifest_signature = 8;
  optional string content_type = 9;
}
message VfsGetBlobChunkRequest {
  string blob_id = 1;
  int32 chunk_index = 2;
}
message VfsGetBlobChunkResponse {
  bytes data = 1;
  int32 chunk_index = 2;
  bool is_final = 3;
  int32 plaintext_length = 4;
  int32 ciphertext_length = 5;
  string nonce = 6;
  string aad_hash = 7;
}
