syntax = "proto3";

package tearleads.v2;

service MlsService {
  rpc UploadKeyPackages(MlsUploadKeyPackagesRequest)
      returns (MlsUploadKeyPackagesResponse);
  rpc GetMyKeyPackages(MlsGetMyKeyPackagesRequest)
      returns (MlsGetMyKeyPackagesResponse);
  rpc GetUserKeyPackages(MlsGetUserKeyPackagesRequest)
      returns (MlsGetUserKeyPackagesResponse);
  rpc DeleteKeyPackage(MlsDeleteKeyPackageRequest)
      returns (MlsDeleteKeyPackageResponse);
  rpc CreateGroup(MlsCreateGroupRequest) returns (MlsCreateGroupResponse);
  rpc ListGroups(MlsListGroupsRequest) returns (MlsListGroupsResponse);
  rpc GetGroup(MlsGetGroupRequest) returns (MlsGetGroupResponse);
  rpc UpdateGroup(MlsUpdateGroupRequest) returns (MlsUpdateGroupResponse);
  rpc DeleteGroup(MlsDeleteGroupRequest) returns (MlsDeleteGroupResponse);
  rpc AddGroupMember(MlsAddGroupMemberRequest)
      returns (MlsAddGroupMemberResponse);
  rpc GetGroupMembers(MlsGetGroupMembersRequest)
      returns (MlsGetGroupMembersResponse);
  rpc RemoveGroupMember(MlsRemoveGroupMemberRequest)
      returns (MlsRemoveGroupMemberResponse);
  rpc SendGroupMessage(MlsSendGroupMessageRequest)
      returns (MlsSendGroupMessageResponse);
  rpc GetGroupMessages(MlsGetGroupMessagesRequest)
      returns (MlsGetGroupMessagesResponse);
  rpc GetGroupState(MlsGetGroupStateRequest) returns (MlsGetGroupStateResponse);
  rpc UploadGroupState(MlsUploadGroupStateRequest)
      returns (MlsUploadGroupStateResponse);
  rpc GetWelcomeMessages(MlsGetWelcomeMessagesRequest)
      returns (MlsGetWelcomeMessagesResponse);
  rpc AcknowledgeWelcome(MlsAcknowledgeWelcomeRequest)
      returns (MlsAcknowledgeWelcomeResponse);
}

// ---------------------------------------------------------------------------
// Enums
// ---------------------------------------------------------------------------

enum MlsCipherSuite {
  MLS_CIPHER_SUITE_UNSPECIFIED = 0;
  MLS_CIPHER_SUITE_X25519_AES128GCM = 1;
  MLS_CIPHER_SUITE_X25519_CHACHA20 = 3;
  MLS_CIPHER_SUITE_XWING_HYBRID = 65535;
}

enum MlsGroupRole {
  MLS_GROUP_ROLE_UNSPECIFIED = 0;
  MLS_GROUP_ROLE_ADMIN = 1;
  MLS_GROUP_ROLE_MEMBER = 2;
}

enum MlsMessageType {
  MLS_MESSAGE_TYPE_UNSPECIFIED = 0;
  MLS_MESSAGE_TYPE_APPLICATION = 1;
  MLS_MESSAGE_TYPE_COMMIT = 2;
  MLS_MESSAGE_TYPE_PROPOSAL = 3;
}

// ---------------------------------------------------------------------------
// Shared message types
// ---------------------------------------------------------------------------

message MlsKeyPackageEntry {
  string id = 1;
  string user_id = 2;
  string key_package_data = 3;
  string key_package_ref = 4;
  MlsCipherSuite cipher_suite = 5;
  string created_at = 6;
  bool consumed = 7;
}

message MlsGroupInfo {
  string id = 1;
  string group_id_mls = 2;
  string name = 3;
  string description = 4;
  string creator_user_id = 5;
  int64 current_epoch = 6;
  MlsCipherSuite cipher_suite = 7;
  string created_at = 8;
  string updated_at = 9;
  string last_message_at = 10;
  int32 member_count = 11;
  MlsGroupRole role = 12;
}

message MlsGroupMemberInfo {
  string user_id = 1;
  string email = 2;
  int32 leaf_index = 3;
  MlsGroupRole role = 4;
  string joined_at = 5;
  int64 joined_at_epoch = 6;
  bool leaf_index_present = 7;
}

message MlsMessageInfo {
  string id = 1;
  string group_id = 2;
  string sender_user_id = 3;
  string sender_email = 4;
  int64 epoch = 5;
  string ciphertext = 6;
  MlsMessageType message_type = 7;
  string content_type = 8;
  int64 sequence_number = 9;
  string sent_at = 10;
  string created_at = 11;
}

message MlsGroupStateInfo {
  string id = 1;
  string group_id = 2;
  int64 epoch = 3;
  string encrypted_state = 4;
  string state_hash = 5;
  string created_at = 6;
}

message MlsWelcomeMessageInfo {
  string id = 1;
  string group_id = 2;
  string group_name = 3;
  string welcome = 4;
  string key_package_ref = 5;
  int64 epoch = 6;
  string created_at = 7;
}

// ---------------------------------------------------------------------------
// Key Packages
// ---------------------------------------------------------------------------

message MlsUploadKeyPackageInput {
  string key_package_data = 1;
  string key_package_ref = 2;
  MlsCipherSuite cipher_suite = 3;
}

message MlsUploadKeyPackagesRequest {
  repeated MlsUploadKeyPackageInput key_packages = 1;
}

message MlsUploadKeyPackagesResponse {
  repeated MlsKeyPackageEntry key_packages = 1;
}

message MlsGetMyKeyPackagesRequest {}

message MlsGetMyKeyPackagesResponse {
  repeated MlsKeyPackageEntry key_packages = 1;
}

message MlsGetUserKeyPackagesRequest {
  string user_id = 1;
}

message MlsGetUserKeyPackagesResponse {
  repeated MlsKeyPackageEntry key_packages = 1;
}

message MlsDeleteKeyPackageRequest {
  string id = 1;
}

message MlsDeleteKeyPackageResponse {}

// ---------------------------------------------------------------------------
// Groups
// ---------------------------------------------------------------------------

message MlsCreateGroupRequest {
  string name = 1;
  string description = 2;
  string group_id_mls = 3;
  MlsCipherSuite cipher_suite = 4;
}

message MlsCreateGroupResponse {
  MlsGroupInfo group = 1;
}

message MlsListGroupsRequest {}

message MlsListGroupsResponse {
  repeated MlsGroupInfo groups = 1;
}

message MlsGetGroupRequest {
  string group_id = 1;
}

message MlsGetGroupResponse {
  MlsGroupInfo group = 1;
  repeated MlsGroupMemberInfo members = 2;
}

message MlsUpdateGroupRequest {
  string group_id = 1;
  string name = 2;
  string description = 3;
}

message MlsUpdateGroupResponse {
  MlsGroupInfo group = 1;
}

message MlsDeleteGroupRequest {
  string group_id = 1;
}

message MlsDeleteGroupResponse {}

// ---------------------------------------------------------------------------
// Group Members
// ---------------------------------------------------------------------------

message MlsAddGroupMemberRequest {
  string group_id = 1;
  string user_id = 2;
  string commit = 3;
  string welcome = 4;
  string key_package_ref = 5;
  int64 new_epoch = 6;
}

message MlsAddGroupMemberResponse {
  MlsGroupMemberInfo member = 1;
}

message MlsGetGroupMembersRequest {
  string group_id = 1;
}

message MlsGetGroupMembersResponse {
  repeated MlsGroupMemberInfo members = 1;
}

message MlsRemoveGroupMemberRequest {
  string group_id = 1;
  string user_id = 2;
  string commit = 3;
  int64 new_epoch = 4;
}

message MlsRemoveGroupMemberResponse {}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

message MlsSendGroupMessageRequest {
  string group_id = 1;
  string ciphertext = 2;
  int64 epoch = 3;
  MlsMessageType message_type = 4;
  string content_type = 5;
}

message MlsSendGroupMessageResponse {
  MlsMessageInfo message = 1;
}

message MlsGetGroupMessagesRequest {
  string group_id = 1;
  string cursor = 2;
  int32 limit = 3;
}

message MlsGetGroupMessagesResponse {
  repeated MlsMessageInfo messages = 1;
  bool has_more = 2;
  string cursor = 3;
}

// ---------------------------------------------------------------------------
// Group State
// ---------------------------------------------------------------------------

message MlsGetGroupStateRequest {
  string group_id = 1;
}

message MlsGetGroupStateResponse {
  MlsGroupStateInfo state = 1;
}

message MlsUploadGroupStateRequest {
  string group_id = 1;
  int64 epoch = 2;
  string encrypted_state = 3;
  string state_hash = 4;
}

message MlsUploadGroupStateResponse {
  MlsGroupStateInfo state = 1;
}

// ---------------------------------------------------------------------------
// Welcome Messages
// ---------------------------------------------------------------------------

message MlsGetWelcomeMessagesRequest {}

message MlsGetWelcomeMessagesResponse {
  repeated MlsWelcomeMessageInfo welcomes = 1;
}

message MlsAcknowledgeWelcomeRequest {
  string id = 1;
  string group_id = 2;
}

message MlsAcknowledgeWelcomeResponse {}
