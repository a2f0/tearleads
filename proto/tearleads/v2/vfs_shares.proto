syntax = "proto3";

package tearleads.v2;

service VfsSharesService {
  rpc GetItemShares(VfsSharesGetItemSharesRequest)
      returns (VfsSharesGetItemSharesResponse);
  rpc CreateShare(VfsSharesCreateShareRequest)
      returns (VfsSharesCreateShareResponse);
  rpc UpdateShare(VfsSharesUpdateShareRequest)
      returns (VfsSharesUpdateShareResponse);
  rpc DeleteShare(VfsSharesDeleteShareRequest)
      returns (VfsSharesDeleteShareResponse);
  rpc CreateOrgShare(VfsSharesCreateOrgShareRequest)
      returns (VfsSharesCreateOrgShareResponse);
  rpc DeleteOrgShare(VfsSharesDeleteOrgShareRequest)
      returns (VfsSharesDeleteOrgShareResponse);
  rpc SearchShareTargets(VfsSharesSearchShareTargetsRequest)
      returns (VfsSharesSearchShareTargetsResponse);
  rpc GetSharePolicyPreview(VfsSharesGetSharePolicyPreviewRequest)
      returns (VfsSharesGetSharePolicyPreviewResponse);
}

message VfsSharesGetItemSharesRequest {
  string item_id = 1;
}

message VfsSharesGetItemSharesResponse {
  repeated VfsSharePayload shares = 1;
  repeated VfsOrgSharePayload org_shares = 2;
}

message VfsWrappedKeyPayload {
  string recipient_user_id = 1;
  string recipient_public_key_id = 2;
  int32 key_epoch = 3;
  string encrypted_key = 4;
  string sender_signature = 5;
}

message VfsOrgWrappedKeyPayload {
  string recipient_org_id = 1;
  string recipient_public_key_id = 2;
  int32 key_epoch = 3;
  string encrypted_key = 4;
  string sender_signature = 5;
}

message VfsSharePayload {
  string id = 1;
  string item_id = 2;
  string share_type = 3;
  string target_id = 4;
  string target_name = 5;
  string permission_level = 6;
  string created_by = 7;
  string created_by_email = 8;
  string created_at = 9;
  optional string expires_at = 10;
  optional VfsWrappedKeyPayload wrapped_key = 11;
}

message VfsOrgSharePayload {
  string id = 1;
  string source_org_id = 2;
  string source_org_name = 3;
  string target_org_id = 4;
  string target_org_name = 5;
  string item_id = 6;
  string permission_level = 7;
  string created_by = 8;
  string created_by_email = 9;
  string created_at = 10;
  optional string expires_at = 11;
  optional VfsOrgWrappedKeyPayload wrapped_key = 12;
}

message VfsSharesCreateShareRequest {
  string item_id = 1;
  string share_type = 2;
  string target_id = 3;
  string permission_level = 4;
  optional string expires_at = 5;
  optional VfsWrappedKeyPayload wrapped_key = 6;
}

message VfsSharesCreateShareResponse {
  VfsSharePayload share = 1;
}

message VfsSharesUpdateShareRequest {
  string share_id = 1;
  optional string permission_level = 2;
  optional string expires_at = 3;
  bool clear_expires_at = 4;
}

message VfsSharesUpdateShareResponse {
  VfsSharePayload share = 1;
}

message VfsSharesDeleteShareRequest {
  string share_id = 1;
}

message VfsSharesDeleteShareResponse {
  bool deleted = 1;
}

message VfsSharesCreateOrgShareRequest {
  string item_id = 1;
  string source_org_id = 2;
  string target_org_id = 3;
  string permission_level = 4;
  optional string expires_at = 5;
  optional VfsOrgWrappedKeyPayload wrapped_key = 6;
}

message VfsSharesCreateOrgShareResponse {
  VfsOrgSharePayload org_share = 1;
}

message VfsSharesDeleteOrgShareRequest {
  string share_id = 1;
}

message VfsSharesDeleteOrgShareResponse {
  bool deleted = 1;
}

message VfsSharesSearchShareTargetsRequest {
  string q = 1;
  string type = 2;
}

message VfsShareTargetPayload {
  string id = 1;
  string type = 2;
  string name = 3;
  optional string description = 4;
}

message VfsSharesSearchShareTargetsResponse {
  repeated VfsShareTargetPayload results = 1;
}

message VfsSharesGetSharePolicyPreviewRequest {
  string root_item_id = 1;
  string principal_type = 2;
  string principal_id = 3;
  int32 limit = 4;
  string cursor = 5;
  int32 max_depth = 6;
  string q = 7;
  repeated string object_type = 8;
}

message VfsSharePolicyPreviewNodePayload {
  string item_id = 1;
  string object_type = 2;
  int32 depth = 3;
  string path = 4;
  string state = 5;
  optional string effective_access_level = 6;
  repeated string source_policy_ids = 7;
}

message VfsSharePolicyPreviewSummaryPayload {
  int32 total_matching_nodes = 1;
  int32 returned_nodes = 2;
  int32 direct_count = 3;
  int32 derived_count = 4;
  int32 denied_count = 5;
  int32 included_count = 6;
  int32 excluded_count = 7;
}

message VfsSharesGetSharePolicyPreviewResponse {
  repeated VfsSharePolicyPreviewNodePayload nodes = 1;
  VfsSharePolicyPreviewSummaryPayload summary = 2;
  optional string next_cursor = 3;
}
