syntax = "proto3";

package tearleads.v2;

import "google/protobuf/struct.proto";

// Wave 1 admin contracts used by the DAL-first migration track.
service AdminService {
  rpc GetContext(AdminGetContextRequest) returns (AdminGetContextResponse);
  rpc ListGroups(AdminListGroupsRequest) returns (AdminListGroupsResponse);
  rpc GetGroup(AdminGetGroupRequest) returns (AdminGetGroupResponse);
  rpc GetGroupMembers(AdminGetGroupMembersRequest)
      returns (AdminGetGroupMembersResponse);
  rpc ListOrganizations(AdminListOrganizationsRequest)
      returns (AdminListOrganizationsResponse);
  rpc GetOrganization(AdminGetOrganizationRequest)
      returns (AdminGetOrganizationResponse);
  rpc GetOrgGroups(AdminGetOrgGroupsRequest) returns (AdminGetOrgGroupsResponse);
  rpc ListUsers(AdminListUsersRequest) returns (AdminListUsersResponse);
  rpc GetUser(AdminGetUserRequest) returns (AdminGetUserResponse);
  rpc GetPostgresInfo(AdminGetPostgresInfoRequest)
      returns (AdminGetPostgresInfoResponse);
  rpc GetTables(AdminGetTablesRequest) returns (AdminGetTablesResponse);
  rpc GetColumns(AdminGetColumnsRequest) returns (AdminGetColumnsResponse);
  rpc GetRows(AdminGetRowsRequest) returns (AdminGetRowsResponse);
  rpc GetRedisKeys(AdminGetRedisKeysRequest) returns (AdminGetRedisKeysResponse);
  rpc GetRedisValue(AdminGetRedisValueRequest)
      returns (AdminGetRedisValueResponse);
  rpc DeleteRedisKey(AdminDeleteRedisKeyRequest)
      returns (AdminDeleteRedisKeyResponse);
  rpc GetRedisDbSize(AdminGetRedisDbSizeRequest)
      returns (AdminGetRedisDbSizeResponse);
}

message AdminGetContextRequest {}

message AdminGetContextResponse {
  bool is_root_admin = 1;
  repeated AdminScopeOrganization organizations = 2;
  optional string default_organization_id = 3;
}

message AdminScopeOrganization {
  string id = 1;
  string name = 2;
}

message AdminListGroupsRequest {
  optional string organization_id = 1;
}

message AdminListGroupsResponse {
  repeated AdminGroupWithMemberCount groups = 1;
}

message AdminGroupWithMemberCount {
  string id = 1;
  string organization_id = 2;
  string name = 3;
  optional string description = 4;
  string created_at = 5;
  string updated_at = 6;
  uint32 member_count = 7;
}

message AdminGetGroupRequest {
  string id = 1;
}

message AdminGetGroupResponse {
  AdminGroup group = 1;
  repeated AdminGroupMember members = 2;
}

message AdminGetGroupMembersRequest {
  string id = 1;
}

message AdminGetGroupMembersResponse {
  repeated AdminGroupMember members = 1;
}

message AdminGroup {
  string id = 1;
  string organization_id = 2;
  string name = 3;
  optional string description = 4;
  string created_at = 5;
  string updated_at = 6;
}

message AdminGroupMember {
  string user_id = 1;
  string email = 2;
  string joined_at = 3;
}

message AdminListOrganizationsRequest {
  optional string organization_id = 1;
}

message AdminListOrganizationsResponse {
  repeated AdminOrganization organizations = 1;
}

message AdminGetOrganizationRequest {
  string id = 1;
}

message AdminGetOrganizationResponse {
  AdminOrganization organization = 1;
}

message AdminOrganization {
  string id = 1;
  string name = 2;
  optional string description = 3;
  string created_at = 4;
  string updated_at = 5;
}

message AdminListUsersRequest {
  optional string organization_id = 1;
}

message AdminListUsersResponse {
  repeated AdminUser users = 1;
}

message AdminGetOrgGroupsRequest {
  string id = 1;
}

message AdminGetOrgGroupsResponse {
  repeated AdminOrganizationGroup groups = 1;
}

message AdminOrganizationGroup {
  string id = 1;
  string name = 2;
  optional string description = 3;
  uint32 member_count = 4;
}

message AdminGetUserRequest {
  string id = 1;
}

message AdminGetUserResponse {
  AdminUser user = 1;
}

message AdminUser {
  string id = 1;
  string email = 2;
  bool email_confirmed = 3;
  bool admin = 4;
  repeated string organization_ids = 5;
  optional string created_at = 6;
  optional string last_active_at = 7;
  AdminUserAccounting accounting = 8;
  bool disabled = 9;
  optional string disabled_at = 10;
  optional string disabled_by = 11;
  optional string marked_for_deletion_at = 12;
  optional string marked_for_deletion_by = 13;
}

message AdminUserAccounting {
  uint64 total_prompt_tokens = 1;
  uint64 total_completion_tokens = 2;
  uint64 total_tokens = 3;
  uint64 request_count = 4;
  optional string last_used_at = 5;
}

message AdminGetPostgresInfoRequest {}

message AdminGetPostgresInfoResponse {
  AdminPostgresConnectionInfo info = 1;
  optional string server_version = 2;
}

message AdminPostgresConnectionInfo {
  optional string host = 1;
  optional uint32 port = 2;
  optional string database = 3;
  optional string user = 4;
}

message AdminGetTablesRequest {}

message AdminGetTablesResponse {
  repeated AdminPostgresTableInfo tables = 1;
}

message AdminPostgresTableInfo {
  string schema = 1;
  string name = 2;
  int64 row_count = 3;
  int64 total_bytes = 4;
  int64 table_bytes = 5;
  int64 index_bytes = 6;
}

message AdminGetColumnsRequest {
  string schema = 1;
  string table = 2;
}

message AdminGetColumnsResponse {
  repeated AdminPostgresColumnInfo columns = 1;
}

message AdminPostgresColumnInfo {
  string name = 1;
  string type = 2;
  bool nullable = 3;
  optional string default_value = 4;
  uint32 ordinal_position = 5;
}

message AdminGetRowsRequest {
  string schema = 1;
  string table = 2;
  uint32 limit = 3;
  uint32 offset = 4;
  optional string sort_column = 5;
  optional string sort_direction = 6;
}

message AdminGetRowsResponse {
  repeated google.protobuf.Struct rows = 1;
  uint64 total_count = 2;
  uint32 limit = 3;
  uint32 offset = 4;
}

message AdminGetRedisKeysRequest {
  string cursor = 1;
  int32 limit = 2;
}

message AdminGetRedisKeysResponse {
  repeated AdminRedisKeyInfo keys = 1;
  string cursor = 2;
  bool has_more = 3;
}

message AdminRedisKeyInfo {
  string key = 1;
  string type = 2;
  int64 ttl = 3;
}

message AdminGetRedisValueRequest {
  string key = 1;
}

message AdminGetRedisValueResponse {
  string key = 1;
  string type = 2;
  int64 ttl = 3;
  AdminRedisValue value = 4;
}

message AdminDeleteRedisKeyRequest {
  string key = 1;
}

message AdminDeleteRedisKeyResponse {
  bool deleted = 1;
}

message AdminRedisValue {
  oneof value {
    string string_value = 1;
    AdminRedisStringList list_value = 2;
    AdminRedisStringMap map_value = 3;
  }
}

message AdminRedisStringList {
  repeated string values = 1;
}

message AdminRedisStringMap {
  map<string, string> entries = 1;
}

message AdminGetRedisDbSizeRequest {}

message AdminGetRedisDbSizeResponse {
  uint64 count = 1;
}
