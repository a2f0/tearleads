syntax = "proto3";

package tearleads.v1;

service AdminService {
  rpc GetContext(AdminGetContextRequest) returns (AdminGetContextResponse);
  rpc GetPostgresInfo(AdminGetPostgresInfoRequest)
      returns (AdminGetPostgresInfoResponse);
  rpc GetTables(AdminGetTablesRequest) returns (AdminGetTablesResponse);
  rpc GetColumns(AdminGetColumnsRequest) returns (AdminGetColumnsResponse);
  rpc GetRows(AdminGetRowsRequest) returns (AdminGetRowsResponse);
  rpc GetRedisKeys(AdminGetRedisKeysRequest) returns (AdminGetRedisKeysResponse);
  rpc GetRedisValue(AdminGetRedisValueRequest)
      returns (AdminGetRedisValueResponse);
  rpc DeleteRedisKey(AdminDeleteRedisKeyRequest)
      returns (AdminDeleteRedisKeyResponse);
  rpc GetRedisDbSize(AdminGetRedisDbSizeRequest)
      returns (AdminGetRedisDbSizeResponse);
  rpc ListGroups(AdminListGroupsRequest) returns (AdminListGroupsResponse);
  rpc GetGroup(AdminGetGroupRequest) returns (AdminGetGroupResponse);
  rpc CreateGroup(AdminCreateGroupRequest) returns (AdminCreateGroupResponse);
  rpc UpdateGroup(AdminUpdateGroupRequest) returns (AdminUpdateGroupResponse);
  rpc DeleteGroup(AdminDeleteGroupRequest) returns (AdminDeleteGroupResponse);
  rpc GetGroupMembers(AdminGetGroupMembersRequest)
      returns (AdminGetGroupMembersResponse);
  rpc AddGroupMember(AdminAddGroupMemberRequest)
      returns (AdminAddGroupMemberResponse);
  rpc RemoveGroupMember(AdminRemoveGroupMemberRequest)
      returns (AdminRemoveGroupMemberResponse);
  rpc ListOrganizations(AdminListOrganizationsRequest)
      returns (AdminListOrganizationsResponse);
  rpc GetOrganization(AdminGetOrganizationRequest)
      returns (AdminGetOrganizationResponse);
  rpc CreateOrganization(AdminCreateOrganizationRequest)
      returns (AdminCreateOrganizationResponse);
  rpc UpdateOrganization(AdminUpdateOrganizationRequest)
      returns (AdminUpdateOrganizationResponse);
  rpc DeleteOrganization(AdminDeleteOrganizationRequest)
      returns (AdminDeleteOrganizationResponse);
  rpc GetOrgUsers(AdminGetOrgUsersRequest) returns (AdminGetOrgUsersResponse);
  rpc GetOrgGroups(AdminGetOrgGroupsRequest)
      returns (AdminGetOrgGroupsResponse);
  rpc ListUsers(AdminListUsersRequest) returns (AdminListUsersResponse);
  rpc GetUser(AdminGetUserRequest) returns (AdminGetUserResponse);
  rpc UpdateUser(AdminUpdateUserRequest) returns (AdminUpdateUserResponse);
}

message AdminGetContextRequest {}

message AdminGetContextResponse {
  string json = 1;
}

message AdminGetPostgresInfoRequest {}

message AdminGetPostgresInfoResponse {
  string json = 1;
}

message AdminGetTablesRequest {}

message AdminGetTablesResponse {
  string json = 1;
}

message AdminGetColumnsRequest {
  string schema = 1;
  string table = 2;
}

message AdminGetColumnsResponse {
  string json = 1;
}

message AdminGetRowsRequest {
  string schema = 1;
  string table = 2;
  int32 limit = 3;
  int32 offset = 4;
  string sort_column = 5;
  string sort_direction = 6;
}

message AdminGetRowsResponse {
  string json = 1;
}

message AdminGetRedisKeysRequest {
  string cursor = 1;
  int32 limit = 2;
}

message AdminGetRedisKeysResponse {
  string json = 1;
}

message AdminGetRedisValueRequest {
  string key = 1;
}

message AdminGetRedisValueResponse {
  string json = 1;
}

message AdminDeleteRedisKeyRequest {
  string key = 1;
}

message AdminDeleteRedisKeyResponse {
  string json = 1;
}

message AdminGetRedisDbSizeRequest {}

message AdminGetRedisDbSizeResponse {
  string json = 1;
}

message AdminListGroupsRequest {
  string organization_id = 1;
}

message AdminListGroupsResponse {
  string json = 1;
}

message AdminGetGroupRequest {
  string id = 1;
}

message AdminGetGroupResponse {
  string json = 1;
}

message AdminCreateGroupRequest {
  string json = 1;
}

message AdminCreateGroupResponse {
  string json = 1;
}

message AdminUpdateGroupRequest {
  string id = 1;
  string json = 2;
}

message AdminUpdateGroupResponse {
  string json = 1;
}

message AdminDeleteGroupRequest {
  string id = 1;
}

message AdminDeleteGroupResponse {
  string json = 1;
}

message AdminGetGroupMembersRequest {
  string id = 1;
}

message AdminGetGroupMembersResponse {
  string json = 1;
}

message AdminAddGroupMemberRequest {
  string id = 1;
  string json = 2;
}

message AdminAddGroupMemberResponse {
  string json = 1;
}

message AdminRemoveGroupMemberRequest {
  string group_id = 1;
  string user_id = 2;
}

message AdminRemoveGroupMemberResponse {
  string json = 1;
}

message AdminListOrganizationsRequest {
  string organization_id = 1;
}

message AdminListOrganizationsResponse {
  string json = 1;
}

message AdminGetOrganizationRequest {
  string id = 1;
}

message AdminGetOrganizationResponse {
  string json = 1;
}

message AdminCreateOrganizationRequest {
  string json = 1;
}

message AdminCreateOrganizationResponse {
  string json = 1;
}

message AdminUpdateOrganizationRequest {
  string id = 1;
  string json = 2;
}

message AdminUpdateOrganizationResponse {
  string json = 1;
}

message AdminDeleteOrganizationRequest {
  string id = 1;
}

message AdminDeleteOrganizationResponse {
  string json = 1;
}

message AdminGetOrgUsersRequest {
  string id = 1;
}

message AdminGetOrgUsersResponse {
  string json = 1;
}

message AdminGetOrgGroupsRequest {
  string id = 1;
}

message AdminGetOrgGroupsResponse {
  string json = 1;
}

message AdminListUsersRequest {
  string organization_id = 1;
}

message AdminListUsersResponse {
  string json = 1;
}

message AdminGetUserRequest {
  string id = 1;
}

message AdminGetUserResponse {
  string json = 1;
}

message AdminUpdateUserRequest {
  string id = 1;
  string json = 2;
}

message AdminUpdateUserResponse {
  string json = 1;
}
