version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  # Message names are service-prefixed because all proto files share package
  # tearleads.v1 and protobuf symbols must be globally unique within a package.
  ignore_only:
    RPC_REQUEST_STANDARD_NAME:
      - tearleads/v1/admin.proto
      - tearleads/v1/chat.proto
      - tearleads/v1/mls.proto
      - tearleads/v1/vfs.proto
      - tearleads/v1/vfs_shares.proto
    RPC_RESPONSE_STANDARD_NAME:
      - tearleads/v1/admin.proto
      - tearleads/v1/chat.proto
      - tearleads/v1/mls.proto
      - tearleads/v1/vfs.proto
      - tearleads/v1/vfs_shares.proto
breaking:
  use:
    - FILE
