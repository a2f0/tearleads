version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  # Message names are service-prefixed because these files share package scope
  # and protobuf symbols must be globally unique within each package.
  ignore_only:
    RPC_REQUEST_STANDARD_NAME:
      - tearleads/v2/auth.proto
      - tearleads/v2/admin.proto
      - tearleads/v2/mls.proto
      - tearleads/v2/vfs.proto
      - tearleads/v2/vfs_shares.proto
    RPC_RESPONSE_STANDARD_NAME:
      - tearleads/v2/auth.proto
      - tearleads/v2/admin.proto
      - tearleads/v2/mls.proto
      - tearleads/v2/vfs.proto
      - tearleads/v2/vfs_shares.proto
breaking:
  use:
    - FILE
  ignore_only:
    FIELD_NO_DELETE:
      - tearleads/v2/vfs.proto
    FIELD_SAME_NAME:
      - tearleads/v2/vfs.proto
    FIELD_SAME_TYPE:
      - tearleads/v2/vfs.proto
    FIELD_SAME_JSON_NAME:
      - tearleads/v2/vfs.proto
    MESSAGE_NO_DELETE:
      - tearleads/v2/vfs.proto
    FIELD_SAME_CARDINALITY:
      - tearleads/v2/vfs.proto

