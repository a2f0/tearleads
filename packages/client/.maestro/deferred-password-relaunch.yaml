appId: com.tearleads.app
env:
  PASSWORD: "deferredrelaunch123!"
---
# Deferred Password Relaunch Test
# Verifies deferred-password instances survive a clean app relaunch on mobile.

- launchApp:
    clearState: true

- assertVisible: "Tearleads"

# Load shared database helper functions
- runFlow: helpers/db-helpers.yaml

# Navigate to SQLite page
- evalScript: document.querySelector('[data-testid="sqlite-link"]').click()

# Wait for SQLite page to load
- evalScript: window.waitForElement('[data-testid="database-test"]')

# Fresh installs should auto-initialize and unlock with deferred password
- evalScript: window.waitForStatus('Unlocked')

# Verify deferred-password indicator and CTA are shown
- evalScript: |
    const status = document.querySelector('[data-testid="db-password-status"]');
    if (!status || status.textContent !== 'Not Set') {
      throw new Error('Expected deferred password status "Not Set" on first launch');
    }
    const setButton = document.querySelector('[data-testid="db-set-password-button"]');
    if (!setButton) {
      throw new Error('Expected Set Password button on first launch');
    }
    return 'ok';

# Write test data before relaunch
- evalScript: document.querySelector('[data-testid="db-write-button"]').click()
- evalScript: window.waitForResult('success', 'Wrote test data:')

# Persist written value so we can compare after relaunch
- evalScript: |
    const testData = document.querySelector('[data-testid="db-test-data"]');
    if (!testData || !/^test-value-\d+$/.test(testData.textContent)) {
      throw new Error('Expected test data before relaunch');
    }
    localStorage.setItem('maestro-deferred-relaunch-value', testData.textContent);
    return 'ok';

# Simulate clean restart without wiping app data
- stopApp

- launchApp:
    clearState: false

- assertVisible: "Tearleads"

# Re-load helper functions after app restart
- runFlow: helpers/db-helpers.yaml

# Navigate back to SQLite page
- evalScript: document.querySelector('[data-testid="sqlite-link"]').click()
- evalScript: window.waitForElement('[data-testid="database-test"]')

# Deferred session should still restore as unlocked after relaunch
- evalScript: window.waitForStatus('Unlocked')

# Deferred-password indicator and CTA must still be present after relaunch
- evalScript: |
    const status = document.querySelector('[data-testid="db-password-status"]');
    if (!status || status.textContent !== 'Not Set') {
      throw new Error('Expected deferred password status "Not Set" after relaunch');
    }
    const setButton = document.querySelector('[data-testid="db-set-password-button"]');
    if (!setButton) {
      throw new Error('Expected Set Password button after relaunch');
    }
    return 'ok';

# Verify previously written data is still readable
- evalScript: document.querySelector('[data-testid="db-read-button"]').click()
- evalScript: window.waitForResult('success', 'Read test data:')
- evalScript: |
    const testData = document.querySelector('[data-testid="db-test-data"]');
    const expected = localStorage.getItem('maestro-deferred-relaunch-value');
    if (!testData || !expected) {
      throw new Error('Missing data for post-relaunch comparison');
    }
    if (testData.textContent !== expected) {
      throw new Error('Data mismatch after relaunch. Expected: ' + expected + ', got: ' + testData.textContent);
    }
    return 'ok';

# Set password for deferred instance and verify lock/unlock still works
- evalScript: window.setPassword('${PASSWORD}')
- evalScript: document.querySelector('[data-testid="db-set-password-button"]').click()
- evalScript: window.waitForResult('success', 'Password set successfully')
- evalScript: window.waitForStatus('Unlocked')

- evalScript: document.querySelector('[data-testid="db-lock-button"]').click()
- evalScript: window.waitForStatus('Locked')
- evalScript: window.setPassword('${PASSWORD}')
- evalScript: document.querySelector('[data-testid="db-unlock-button"]').click()
- evalScript: window.waitForStatus('Unlocked')

# Final read verifies data persisted through deferred->password transition
- evalScript: document.querySelector('[data-testid="db-read-button"]').click()
- evalScript: window.waitForResult('success', 'Read test data:')
- evalScript: |
    const testData = document.querySelector('[data-testid="db-test-data"]');
    const expected = localStorage.getItem('maestro-deferred-relaunch-value');
    if (!testData || !expected) {
      throw new Error('Final data verification failed: missing data for comparison');
    }
    if (testData.textContent !== expected) {
      throw new Error('Final data verification failed: data mismatch. Expected: ' + expected + ', got: ' + testData.textContent);
    }
    return 'ok';
