appId: com.tearleads.app
---
# Deferred Password Reinstall Test
# Simulates the runIosDevice.sh scenario where the app is reinstalled
# (clearState: true wipes IndexedDB/files but Keychain persists on iOS).
# On second launch, the init flow must recover gracefully.

- launchApp:
    clearState: true

- assertVisible: "Tearleads"

# Load shared database helper functions
- runFlow: helpers/db-helpers.yaml

# Navigate to SQLite page
- evalScript: document.querySelector('[data-testid="sqlite-link"]').click()
- evalScript: window.waitForElement('[data-testid="database-test"]')

# Fresh install should auto-initialize with deferred password
- evalScript: window.waitForStatus('Unlocked')

# Verify deferred-password state
- evalScript: |
    const status = document.querySelector('[data-testid="db-password-status"]');
    if (!status || status.textContent !== 'Not Set') {
      throw new Error('Expected deferred password status "Not Set" on first launch, got: ' + (status ? status.textContent : 'null'));
    }
    return 'ok';

# Write test data
- evalScript: document.querySelector('[data-testid="db-write-button"]').click()
- evalScript: window.waitForResult('success', 'Wrote test data:')

# ─── Reinstall (clearState: true simulates app reinstall) ───
# On iOS, clearState: true wipes app container (IndexedDB, database files)
# but Keychain entries persist (they're stored system-wide).
# This is similar to what `xcrun devicectl device install app` does.
- stopApp

- launchApp:
    clearState: true

- assertVisible: "Tearleads"
- runFlow: helpers/db-helpers.yaml

- evalScript: document.querySelector('[data-testid="sqlite-link"]').click()
- evalScript: window.waitForElement('[data-testid="database-test"]')

# After reinstall, the app should auto-initialize fresh (not show "Not Set Up")
- evalScript: |
    window.waitFor(
      function() {
        var s = document.querySelector('[data-testid="db-status"]');
        if (!s) return false;
        if (s.textContent === 'Unlocked') return true;
        if (s.textContent === 'Not Set Up' || s.textContent === 'Locked') {
          throw new Error('FAIL after reinstall: status=' + s.textContent + ' (expected Unlocked or fresh auto-init)');
        }
        return false;
      },
      'Expected Unlocked after reinstall'
    );

# Deferred-password indicator must be present
- evalScript: |
    const status = document.querySelector('[data-testid="db-password-status"]');
    if (!status || status.textContent !== 'Not Set') {
      throw new Error('Expected deferred password "Not Set" after reinstall, got: ' + (status ? status.textContent : 'null'));
    }
    return 'ok';

# Write new test data (old data lost due to reinstall)
- evalScript: document.querySelector('[data-testid="db-write-button"]').click()
- evalScript: window.waitForResult('success', 'Wrote test data:')

- evalScript: |
    const testData = document.querySelector('[data-testid="db-test-data"]');
    if (!testData || !/^test-value-\d+$/.test(testData.textContent)) {
      throw new Error('Expected test data after reinstall');
    }
    localStorage.setItem('maestro-reinstall-value', testData.textContent);
    return 'ok';

# ─── Second reinstall ───
- stopApp

- launchApp:
    clearState: true

- assertVisible: "Tearleads"
- runFlow: helpers/db-helpers.yaml

- evalScript: document.querySelector('[data-testid="sqlite-link"]').click()
- evalScript: window.waitForElement('[data-testid="database-test"]')

# Must still auto-initialize after second reinstall
- evalScript: |
    window.waitFor(
      function() {
        var s = document.querySelector('[data-testid="db-status"]');
        if (!s) return false;
        if (s.textContent === 'Unlocked') return true;
        if (s.textContent === 'Not Set Up' || s.textContent === 'Locked') {
          throw new Error('FAIL after second reinstall: status=' + s.textContent);
        }
        return false;
      },
      'Expected Unlocked after second reinstall'
    );

- evalScript: |
    const status = document.querySelector('[data-testid="db-password-status"]');
    if (!status || status.textContent !== 'Not Set') {
      throw new Error('Expected deferred password "Not Set" after second reinstall, got: ' + (status ? status.textContent : 'null'));
    }
    return 'ok';

# Verify can still write/read data
- evalScript: document.querySelector('[data-testid="db-write-button"]').click()
- evalScript: window.waitForResult('success', 'Wrote test data:')
- evalScript: document.querySelector('[data-testid="db-read-button"]').click()
- evalScript: window.waitForResult('success', 'Read test data:')
