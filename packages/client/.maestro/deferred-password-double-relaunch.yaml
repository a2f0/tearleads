appId: com.tearleads.app
---
# Deferred Password Double Relaunch Test
# Reproduces #2987: two successive app restarts cause "not set up" state.
# The first relaunch usually works, but the second one may fail.

- launchApp:
    clearState: true

- assertVisible: "Tearleads"

# Load shared database helper functions
- runFlow: helpers/db-helpers.yaml

# Navigate to SQLite page
- evalScript: document.querySelector('[data-testid="sqlite-link"]').click()
- evalScript: window.waitForElement('[data-testid="database-test"]')

# Fresh install should auto-initialize with deferred password
- evalScript: window.waitForStatus('Unlocked')

# Verify deferred-password state
- evalScript: |
    const status = document.querySelector('[data-testid="db-password-status"]');
    if (!status || status.textContent !== 'Not Set') {
      throw new Error('Expected deferred password status "Not Set" on first launch, got: ' + (status ? status.textContent : 'null'));
    }
    return 'ok';

# Capture diagnostic state after first launch
- evalScript: |
    const dbStatus = document.querySelector('[data-testid="db-status"]')?.textContent;
    const sessionStatus = document.querySelector('[data-testid="db-session-status"]')?.textContent;
    localStorage.setItem('maestro-launch1-db', dbStatus || 'missing');
    localStorage.setItem('maestro-launch1-session', sessionStatus || 'missing');
    return 'launch1: db=' + dbStatus + ' session=' + sessionStatus;

# Write test data to verify persistence
- evalScript: document.querySelector('[data-testid="db-write-button"]').click()
- evalScript: window.waitForResult('success', 'Wrote test data:')

- evalScript: |
    const testData = document.querySelector('[data-testid="db-test-data"]');
    if (!testData || !/^test-value-\d+$/.test(testData.textContent)) {
      throw new Error('Expected test data before relaunch');
    }
    localStorage.setItem('maestro-deferred-double-value', testData.textContent);
    return 'ok';

# ─── First relaunch ───
- stopApp

- launchApp:
    clearState: false

- assertVisible: "Tearleads"
- runFlow: helpers/db-helpers.yaml

- evalScript: document.querySelector('[data-testid="sqlite-link"]').click()
- evalScript: window.waitForElement('[data-testid="database-test"]')

# Must be unlocked after first relaunch
- evalScript: window.waitForStatus('Unlocked')

# Capture diagnostic state
- evalScript: |
    const dbStatus = document.querySelector('[data-testid="db-status"]')?.textContent;
    const sessionStatus = document.querySelector('[data-testid="db-session-status"]')?.textContent;
    localStorage.setItem('maestro-launch2-db', dbStatus || 'missing');
    localStorage.setItem('maestro-launch2-session', sessionStatus || 'missing');
    return 'relaunch1: db=' + dbStatus + ' session=' + sessionStatus;

# Deferred-password indicator must still be present
- evalScript: |
    const status = document.querySelector('[data-testid="db-password-status"]');
    if (!status || status.textContent !== 'Not Set') {
      throw new Error('Expected deferred password "Not Set" after first relaunch, got: ' + (status ? status.textContent : 'null'));
    }
    return 'ok';

# Verify data persisted across first relaunch
- evalScript: document.querySelector('[data-testid="db-read-button"]').click()
- evalScript: window.waitForResult('success', 'Read test data:')
- evalScript: |
    const testData = document.querySelector('[data-testid="db-test-data"]');
    const expected = localStorage.getItem('maestro-deferred-double-value');
    if (!testData || !expected) {
      throw new Error('Missing data for post-relaunch-1 comparison');
    }
    if (testData.textContent !== expected) {
      throw new Error('Data mismatch after relaunch 1. Expected: ' + expected + ', got: ' + testData.textContent);
    }
    return 'ok';

# ─── Second relaunch (this is where #2987 manifests) ───
- stopApp

- launchApp:
    clearState: false

- assertVisible: "Tearleads"
- runFlow: helpers/db-helpers.yaml

- evalScript: document.querySelector('[data-testid="sqlite-link"]').click()
- evalScript: window.waitForElement('[data-testid="database-test"]')

# Must still be unlocked after second relaunch
- evalScript: |
    window.waitFor(
      function() {
        var s = document.querySelector('[data-testid="db-status"]');
        if (!s) return false;
        if (s.textContent === 'Unlocked') return true;
        if (s.textContent === 'Not Set Up' || s.textContent === 'Locked') {
          var diag = 'FAIL at relaunch 2: status=' + s.textContent;
          diag += ' | launch1=' + localStorage.getItem('maestro-launch1-db');
          diag += '/' + localStorage.getItem('maestro-launch1-session');
          diag += ' | launch2=' + localStorage.getItem('maestro-launch2-db');
          diag += '/' + localStorage.getItem('maestro-launch2-session');
          throw new Error(diag);
        }
        return false;
      },
      'Expected Unlocked after second relaunch'
    );

# Deferred-password indicator must still be present
- evalScript: |
    const status = document.querySelector('[data-testid="db-password-status"]');
    if (!status || status.textContent !== 'Not Set') {
      throw new Error('Expected deferred password "Not Set" after second relaunch, got: ' + (status ? status.textContent : 'null'));
    }
    return 'ok';

# Verify data persisted across both relaunches
- evalScript: document.querySelector('[data-testid="db-read-button"]').click()
- evalScript: window.waitForResult('success', 'Read test data:')
- evalScript: |
    const testData = document.querySelector('[data-testid="db-test-data"]');
    const expected = localStorage.getItem('maestro-deferred-double-value');
    if (!testData || !expected) {
      throw new Error('Missing data for post-relaunch-2 comparison');
    }
    if (testData.textContent !== expected) {
      throw new Error('Data mismatch after relaunch 2. Expected: ' + expected + ', got: ' + testData.textContent);
    }
    return 'ok';

# ─── Third relaunch (extra coverage) ───
- stopApp

- launchApp:
    clearState: false

- assertVisible: "Tearleads"
- runFlow: helpers/db-helpers.yaml

- evalScript: document.querySelector('[data-testid="sqlite-link"]').click()
- evalScript: window.waitForElement('[data-testid="database-test"]')

- evalScript: window.waitForStatus('Unlocked')

# Final data integrity check
- evalScript: document.querySelector('[data-testid="db-read-button"]').click()
- evalScript: window.waitForResult('success', 'Read test data:')
- evalScript: |
    const testData = document.querySelector('[data-testid="db-test-data"]');
    const expected = localStorage.getItem('maestro-deferred-double-value');
    if (!testData || !expected) {
      throw new Error('Missing data for post-relaunch-3 comparison');
    }
    if (testData.textContent !== expected) {
      throw new Error('Data mismatch after relaunch 3. Expected: ' + expected + ', got: ' + testData.textContent);
    }
    return 'ok';
