syntax = "proto3";

package tearleads.vfs;

enum OpType {
  OP_TYPE_UNSPECIFIED = 0;
  ACL_ADD = 1;
  ACL_REMOVE = 2;
  LINK_ADD = 3;
  LINK_REMOVE = 4;
  ITEM_UPSERT = 5;
  ITEM_DELETE = 6;
  LINK_REASSIGN = 7;
}

enum PrincipalType {
  PRINCIPAL_TYPE_UNSPECIFIED = 0;
  USER = 1;
  GROUP = 2;
  ORGANIZATION = 3;
}

enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  READ = 1;
  WRITE = 2;
  ADMIN = 3;
}

enum PushStatus {
  PUSH_STATUS_UNSPECIFIED = 0;
  APPLIED = 1;
  STALE_WRITE_ID = 2;
  OUTDATED_OP = 3;
  INVALID_OP = 4;
  ALREADY_APPLIED = 5;
  ENCRYPTED_ENVELOPE_UNSUPPORTED = 6;
}

message SyncBloomFilter {
  bytes data = 1;
  uint32 capacity = 2;
  float errorRate = 3;
}

message CrdtOperation {
  bytes opId = 1;
  OpType opType = 2;
  bytes itemId = 3;
  bytes replicaId = 4;
  uint64 writeId = 5;
  uint64 occurredAtMs = 6;
  bytes principalId = 7;
  PrincipalType principalType = 8;
  AccessLevel accessLevel = 9;
  bytes parentId = 10;
  bytes childId = 11;
  bytes actorId = 12;
  string sourceTable = 13;
  bytes sourceId = 14;
  uint32 keyEpoch = 16;
  bytes encryptedPayloadBytes = 20;
  bytes encryptionNonceBytes = 21;
  bytes encryptionAadBytes = 22;
  bytes encryptionSignatureBytes = 23;
}

message PushRequest {
  bytes clientId = 1;
  repeated CrdtOperation operations = 2;
  uint32 version = 3;
}

message PushResult {
  bytes opId = 1;
  PushStatus status = 2;
}

message PushResponse {
  bytes clientId = 1;
  repeated PushResult results = 2;
}

message PullResponse {
  repeated CrdtOperation items = 1;
  bool hasMore = 2;
  bytes nextCursor = 3;
  map<string, uint64> lastReconciledWriteIds = 4;
  uint32 version = 5;
  SyncBloomFilter bloomFilter = 6;
}

message ReconcileRequest {
  bytes clientId = 1;
  bytes cursor = 2;
  map<string, uint64> lastReconciledWriteIds = 3;
  uint32 version = 4;
}

message ReconcileResponse {
  bytes clientId = 1;
  bytes cursor = 2;
  map<string, uint64> lastReconciledWriteIds = 3;
}

message SyncSessionRequest {
  bytes clientId = 1;
  bytes cursor = 2;
  uint32 limit = 3;
  repeated CrdtOperation operations = 4;
  map<string, uint64> lastReconciledWriteIds = 5;
  bytes rootId = 6;
  uint32 version = 7;
  SyncBloomFilter bloomFilter = 8;
}

message SyncSessionResponse {
  PushResponse push = 1;
  PullResponse pull = 2;
  ReconcileResponse reconcile = 3;
}
