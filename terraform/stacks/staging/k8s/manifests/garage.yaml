apiVersion: v1
kind: ConfigMap
metadata:
  name: garage-config
  namespace: tearleads
data:
  garage.toml: |
    metadata_dir = "/var/lib/garage/meta"
    data_dir = "/var/lib/garage/data"
    db_engine = "sqlite"

    replication_factor = 1

    rpc_bind_addr = "[::]:3901"
    rpc_public_addr = "garage:3901"
    rpc_secret = "${GARAGE_RPC_SECRET}"

    [s3_api]
    s3_region = "us-east-1"
    api_bind_addr = "[::]:3900"
    root_domain = ".s3.garage.localhost"

    [s3_web]
    bind_addr = "[::]:3902"
    root_domain = ".web.garage.localhost"

    [admin]
    api_bind_addr = "[::]:3903"
    admin_token = "${GARAGE_ADMIN_TOKEN}"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garage-meta
  namespace: tearleads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: garage-data
  namespace: tearleads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage
  namespace: tearleads
spec:
  replicas: 1
  selector:
    matchLabels:
      app: garage
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: garage
    spec:
      initContainers:
        - name: render-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # busybox lacks envsubst; use sed to replace placeholders
              sed \
                -e "s|\${GARAGE_RPC_SECRET}|${GARAGE_RPC_SECRET}|g" \
                -e "s|\${GARAGE_ADMIN_TOKEN}|${GARAGE_ADMIN_TOKEN}|g" \
                /etc/garage-template/garage.toml > /etc/garage-rendered/garage.toml
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: tearleads-secrets
                  key: GARAGE_RPC_SECRET
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tearleads-secrets
                  key: GARAGE_ADMIN_TOKEN
          volumeMounts:
            - name: config
              mountPath: /etc/garage-template
            - name: rendered-config
              mountPath: /etc/garage-rendered
      containers:
        - name: garage
          image: dxflrs/garage:v2.2.0
          ports:
            - containerPort: 3900
              name: s3
            - containerPort: 3901
              name: rpc
            - containerPort: 3902
              name: web
            - containerPort: 3903
              name: admin
          env:
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef:
                  name: tearleads-secrets
                  key: GARAGE_RPC_SECRET
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tearleads-secrets
                  key: GARAGE_ADMIN_TOKEN
          volumeMounts:
            - name: rendered-config
              mountPath: /etc/garage.toml
              subPath: garage.toml
            - name: meta
              mountPath: /var/lib/garage/meta
            - name: data
              mountPath: /var/lib/garage/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            tcpSocket:
              port: 3903
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 3903
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3903
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: garage-config
        - name: rendered-config
          emptyDir: {}
        - name: meta
          persistentVolumeClaim:
            claimName: garage-meta
        - name: data
          persistentVolumeClaim:
            claimName: garage-data
---
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: tearleads
spec:
  publishNotReadyAddresses: true
  selector:
    app: garage
  ports:
    - port: 3900
      targetPort: 3900
      name: s3
    - port: 3901
      targetPort: 3901
      name: rpc
    - port: 3902
      targetPort: 3902
      name: web
    - port: 3903
      targetPort: 3903
      name: admin
---
apiVersion: batch/v1
kind: Job
metadata:
  name: garage-setup
  namespace: tearleads
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-garage
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Garage admin port to accept connections..."
              until wget -S -O /dev/null --timeout=2 http://garage:3903/health 2>&1 | grep -q "HTTP/"; do
                echo "Garage not ready, waiting..."
                sleep 2
              done
              echo "Garage admin port is reachable"
      containers:
        - name: setup
          image: busybox:1.36
          env:
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tearleads-secrets
                  key: GARAGE_ADMIN_TOKEN
            - name: VFS_BLOB_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: tearleads-secrets
                  key: VFS_BLOB_S3_ACCESS_KEY_ID
            - name: VFS_BLOB_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: tearleads-secrets
                  key: VFS_BLOB_S3_SECRET_ACCESS_KEY
          command:
            - sh
            - -c
            - |
              set -eu
              ADMIN="http://garage:3903"
              AUTH="Authorization: Bearer $GARAGE_ADMIN_TOKEN"

              api_get() {
                local path="$1"
                wget -q -O - --header="$AUTH" "$ADMIN$path"
              }

              api_post() {
                local path="$1" body="$2"
                wget -q -O - --header="$AUTH" --header="Content-Type: application/json" \
                  --post-data="$body" "$ADMIN$path"
              }

              retry_api_post() {
                local description="$1" path="$2" body="$3"
                local attempt=1
                local max_attempts=10
                local response=""

                while [ "$attempt" -le "$max_attempts" ]; do
                  if response="$(api_post "$path" "$body" 2>&1)"; then
                    printf '%s' "$response"
                    return 0
                  fi

                  echo "$description failed (attempt $attempt/$max_attempts): $response"
                  sleep 2
                  attempt=$((attempt + 1))
                done

                echo "ERROR: $description failed after $max_attempts attempts."
                return 1
              }

              wait_for_layout_ready() {
                local attempt=1
                local max_attempts=30

                while [ "$attempt" -le "$max_attempts" ]; do
                  if api_get "/v2/ListKeys" >/dev/null 2>&1; then
                    return 0
                  fi

                  echo "Garage layout not ready yet (attempt $attempt/$max_attempts); waiting..."
                  sleep 2
                  attempt=$((attempt + 1))
                done

                echo "ERROR: Garage layout did not become ready in time."
                return 1
              }

              # Get node ID from cluster status
              STATUS="$(api_get "/v2/GetClusterStatus")"
              STATUS_COMPACT="$(printf '%s' "$STATUS" | tr -d '[:space:]')"
              NODE_ID="$(printf '%s' "$STATUS_COMPACT" | sed -n 's/.*"nodes":\[{"id":"\([^"]*\)".*/\1/p')"
              LAYOUT_VERSION="$(printf '%s' "$STATUS_COMPACT" | sed -n 's/.*"layoutVersion":\([0-9][0-9]*\).*/\1/p')"

              if [ -z "$NODE_ID" ]; then
                echo "ERROR: Could not determine Garage node ID from cluster status."
                echo "$STATUS"
                exit 1
              fi

              if [ -z "$LAYOUT_VERSION" ]; then
                echo "ERROR: Could not determine Garage layout version from cluster status."
                echo "$STATUS"
                exit 1
              fi

              echo "Node ID: $NODE_ID"
              echo "Current layout version: $LAYOUT_VERSION"

              # Configure layout when the node has no active role yet.
              if printf '%s' "$STATUS_COMPACT" | grep -q '"role":null'; then
                APPLY_VERSION=$((LAYOUT_VERSION + 1))
                echo "Assigning layout..."
                retry_api_post "UpdateClusterLayout" "/v2/UpdateClusterLayout" \
                  "{\"roles\":[{\"id\":\"$NODE_ID\",\"zone\":\"dc1\",\"capacity\":1000000000,\"tags\":[]}]}" >/dev/null

                echo "Applying layout version $APPLY_VERSION..."
                retry_api_post "ApplyClusterLayout" "/v2/ApplyClusterLayout" \
                  "{\"version\":$APPLY_VERSION}" >/dev/null
              else
                echo "Layout already configured; skipping layout assignment."
              fi

              wait_for_layout_ready

              # Import access key — idempotent (re-imports existing key id).
              echo "Importing access key..."
              retry_api_post "ImportKey" "/v2/ImportKey" \
                "{\"accessKeyId\":\"$VFS_BLOB_S3_ACCESS_KEY_ID\",\"secretAccessKey\":\"$VFS_BLOB_S3_SECRET_ACCESS_KEY\",\"name\":\"vfs-blob-key\"}" >/dev/null

              # Create bucket — idempotent (returns existing bucket id).
              echo "Creating bucket..."
              BUCKET_RESP="$(retry_api_post "CreateBucket" "/v2/CreateBucket" '{"globalAlias":"vfs-blobs"}')"
              BUCKET_ID="$(printf '%s' "$BUCKET_RESP" | tr -d '[:space:]' | sed -n 's/.*"id":"\([^"]*\)".*/\1/p')"

              if [ -z "$BUCKET_ID" ]; then
                echo "ERROR: Could not parse bucket ID from CreateBucket response."
                echo "$BUCKET_RESP"
                exit 1
              fi

              echo "Bucket ID: $BUCKET_ID"

              echo "Granting bucket permissions..."
              retry_api_post "AllowBucketKey" "/v2/AllowBucketKey" \
                "{\"bucketId\":\"$BUCKET_ID\",\"accessKeyId\":\"$VFS_BLOB_S3_ACCESS_KEY_ID\",\"permissions\":{\"read\":true,\"write\":true,\"owner\":true}}" >/dev/null

              echo "Garage setup complete"
      volumes:
        - name: config
          configMap:
            name: garage-config
