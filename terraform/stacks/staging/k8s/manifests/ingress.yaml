apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tearleads-ingress
  namespace: tearleads
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.DOMAIN_PLACEHOLDER,https://DOMAIN_PLACEHOLDER"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Connect-Protocol-Version, X-Organization-Id, X-Grpc-Web, X-User-Agent"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - DOMAIN_PLACEHOLDER
        - app.DOMAIN_PLACEHOLDER
        - api.DOMAIN_PLACEHOLDER
        - download.DOMAIN_PLACEHOLDER
      secretName: tearleads-tls
  rules:
    # Website at root domain: example.com
    - host: DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: website
                port:
                  number: 80
    # Client app: app.example.com
    - host: app.DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 80
    # API: api.example.com
    - host: api.DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: api-v2
                port:
                  number: 5002
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 5001
    # Desktop downloads (Garage web endpoint): download.example.com
    - host: download.DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: garage
                port:
                  number: 3902
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: garage-s3-ingress
  namespace: tearleads
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - pkgs.DOMAIN_PLACEHOLDER
      secretName: garage-s3-tls
  rules:
    - host: pkgs.DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: garage
                port:
                  number: 3900
