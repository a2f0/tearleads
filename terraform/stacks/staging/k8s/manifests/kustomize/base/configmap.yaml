apiVersion: v1
kind: ConfigMap
metadata:
  name: tearleads-config
  namespace: tearleads
data:
  NODE_ENV: "production"
  PORT: "5001"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "tearleads"
  POSTGRES_DATABASE: "${POSTGRES_DATABASE}"
  REDIS_URL: "redis://redis:6379"
  # VFS Blob Storage (Garage / S3-compatible)
  VFS_BLOB_STORE_PROVIDER: "s3"
  VFS_BLOB_S3_ENDPOINT: "http://garage:3900"
  VFS_BLOB_S3_BUCKET: "vfs-blobs"
  VFS_BLOB_S3_REGION: "us-east-1"
  VFS_BLOB_S3_FORCE_PATH_STYLE: "true"
  # VFS CRDT compaction (cronjob)
  VFS_CRDT_COMPACTION_EXECUTE: "0"
  VFS_CRDT_COMPACTION_HOT_RETENTION_DAYS: "30"
  VFS_CRDT_COMPACTION_INACTIVE_CLIENT_DAYS: "90"
  VFS_CRDT_COMPACTION_SAFETY_BUFFER_HOURS: "6"
  VFS_CRDT_COMPACTION_MAX_DELETE_ROWS: "1000"
  VFS_CRDT_COMPACTION_SKIP_SNAPSHOT_REFRESH: "0"
  # Postgres read replica (Phase 2: app-level read/write splitting)
  POSTGRES_REPLICA_HOST: "postgres-replica"
