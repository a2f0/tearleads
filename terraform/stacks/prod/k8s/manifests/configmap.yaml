apiVersion: v1
kind: ConfigMap
metadata:
  name: tearleads-config
  namespace: tearleads
data:
  NODE_ENV: "production"
  PORT: "5001"
  # RDS endpoint - rendered at deploy time from terraform output
  POSTGRES_HOST: "${POSTGRES_HOST}"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "postgres"
  POSTGRES_DATABASE: "${POSTGRES_DATABASE}"
  POSTGRES_SSL: "1"
  POSTGRES_SSL_REJECT_UNAUTHORIZED: "0"
  REDIS_URL: "redis://redis:6379"
  # VFS Blob Storage (AWS S3)
  VFS_BLOB_STORE_PROVIDER: "s3"
  VFS_BLOB_S3_BUCKET: "${VFS_BLOB_S3_BUCKET}"
  VFS_BLOB_S3_REGION: "us-east-1"
  # VFS CRDT compaction (cronjob)
  VFS_CRDT_COMPACTION_EXECUTE: "0"
  VFS_CRDT_COMPACTION_HOT_RETENTION_DAYS: "30"
  VFS_CRDT_COMPACTION_INACTIVE_CLIENT_DAYS: "90"
  VFS_CRDT_COMPACTION_SAFETY_BUFFER_HOURS: "6"
  VFS_CRDT_COMPACTION_MAX_DELETE_ROWS: "1000"
  VFS_CRDT_COMPACTION_SKIP_SNAPSHOT_REFRESH: "0"
  # Outbound email (AWS SES)
  SMTP_OUTBOUND_HOST: "email-smtp.us-east-1.amazonaws.com"
  SMTP_OUTBOUND_PORT: "587"
  SMTP_SECURE: "true"
  SMTP_FROM_ADDRESS: "noreply@mail.tearleads.com"
