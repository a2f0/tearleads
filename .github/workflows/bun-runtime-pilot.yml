name: Bun Runtime Pilot (Vitest)

on:
  pull_request:
    paths:
      - '.github/workflows/bun-runtime-pilot.yml'
      - 'scripts/runBunRuntimePilot.sh'
      - 'scripts/benchmarkBunMigration.sh'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'mise.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bun-runtime-pilot:
    name: Bun Runtime Pilot (${{ matrix.suite }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        suite: [node, ui, api]
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: sh ./scripts/tooling/pm.sh install

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Run Bun runtime pilot
        run: BENCH_REPEATS=1 sh ./scripts/runBunRuntimePilot.sh "${{ matrix.suite }}"
