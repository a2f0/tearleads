name: Bun Test Node Pilot

on:
  pull_request:
    paths:
      - '.github/workflows/bun-test-node-pilot.yml'
      - 'packages/app-builder/**'
      - 'packages/bob-and-alice/**'
      - 'packages/local-write-orchestrator/**'
      - 'packages/mls-core/**'
      - 'packages/msw/**'
      - 'packages/photos/**'
      - 'packages/remote-read-orchestrator/**'
      - 'packages/search/**'
      - 'packages/tee-api/**'
      - 'packages/vehicles/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'mise.toml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bun-test-node-pilot:
    name: Bun Test Node Pilot (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: '@tearleads/app-builder'
            script: test
          - package: '@tearleads/bob-and-alice'
            script: testBun
          - package: '@tearleads/local-write-orchestrator'
            script: test
          - package: '@tearleads/mls-core'
            script: test
          - package: '@tearleads/msw'
            script: test
          - package: '@tearleads/photos'
            script: test
          - package: '@tearleads/remote-read-orchestrator'
            script: test
          - package: '@tearleads/search'
            script: test
          - package: '@tearleads/tee-api'
            script: test
          - package: '@tearleads/vehicles'
            script: test
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: sh ./scripts/tooling/pm.sh install

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Run Bun test pilot
        run: sh ./scripts/tooling/pm.sh --filter "${{ matrix.package }}" run "${{ matrix.script }}"
