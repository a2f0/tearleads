version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 7
    labels:
      - dependencies
    ignore:
      - dependency-name: '@connectrpc/*'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@bufbuild/*'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'protobufjs'
        update-types:
          - 'version-update:semver-major'
    groups:
      protobuf-ecosystem:
        patterns:
          - '@connectrpc/*'
          - '@bufbuild/*'
          - 'protobufjs'
      capacitor:
        patterns:
          - '@capacitor/*'
          - '@capacitor-community/*'
          - '@capawesome/*'
          - '@capgo/*'
      electron:
        patterns:
          - 'electron*'
          - '@electron*'
      testing:
        patterns:
          - '@testing-library/*'
          - 'vitest*'
          - '@vitest/*'
          - 'jsdom'
      pdf:
        patterns:
          - 'react-pdf'
          - 'pdfjs-dist'
      media:
        patterns:
          - 'file-type'
          - 'music-metadata'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      all-actions:
        patterns:
          - '*'

  - package-ecosystem: bundler
    directory: /packages/client
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      ruby-tools:
        patterns:
          - '*'

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      ansible:
        patterns:
          - '*'

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      grpc-ecosystem:
        patterns:
          - 'tonic'
          - 'tonic-build'
          - 'prost'
          - 'prost-build'
          - 'prost-types'

  - package-ecosystem: docker
    directory: /packages/api
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      - dependency-name: node
        update-types:
          - 'version-update:semver-major'
    groups:
      node-images:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /crates/api-v2
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      rust-images:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /packages/client
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      - dependency-name: node
        update-types:
          - 'version-update:semver-major'
    groups:
      node-images:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /packages/smtp-listener
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      - dependency-name: node
        update-types:
          - 'version-update:semver-major'
    groups:
      node-images:
        patterns:
          - '*'

  - package-ecosystem: docker
    directory: /packages/website
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      - dependency-name: node
        update-types:
          - 'version-update:semver-major'
    groups:
      node-images:
        patterns:
          - '*'
